<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Mentis Habits - hábitos simples, claros e prontos a usar no dia a dia." />
  <title>Mentis Habits</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#edf2f8;
      --text:#122033;
      --muted:#66758b;
      --line:#dbe4ef;
      --primary:#2667ff;
      --primary-soft:#dfeaff;
      --success:#dff6e5;
      --success-line:#a7e1b3;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --nav:#ffffffee;
    }
    body.dark{
      --bg:#0b1220;
      --surface:#111a2c;
      --surface-2:#172236;
      --text:#edf4ff;
      --muted:#9fb0c8;
      --line:#26344e;
      --primary:#76a7ff;
      --primary-soft:#19325e;
      --success:#173624;
      --success-line:#2a6b42;
      --danger:#f87171;
      --shadow:0 16px 34px rgba(0,0,0,.35);
      --nav:#111a2cee;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:linear-gradient(180deg,var(--bg),var(--bg));
      color:var(--text);
      transition:background .25s ease,color .25s ease;
    }
    .app{
      min-height:100dvh;
      max-width:560px;
      margin:0 auto;
      position:relative;
      background:var(--bg);
      padding-bottom:96px;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:18px 16px 12px;
      background:linear-gradient(180deg,var(--bg) 78%, rgba(0,0,0,0));
      backdrop-filter: blur(8px);
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .brand h1{
      margin:0;
      font-size:1.4rem;
      letter-spacing:-0.03em;
    }
    .brand small{
      color:var(--muted);
      font-size:.84rem;
    }
    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .icon-btn{
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--text);
      width:44px;height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      font-size:1.15rem;
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .page{
      display:none;
      padding:4px 16px 20px;
      animation:fade .18s ease;
    }
    .page.active{display:block}
    @keyframes fade{from{opacity:.4;transform:translateY(6px)}to{opacity:1;transform:none}}

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:8px 0 14px;
    }
    .section-title h2{
      margin:0;
      font-size:1.06rem;
      letter-spacing:-0.02em;
    }
    .pill{
      background:var(--surface-2);
      color:var(--muted);
      border:1px solid var(--line);
      padding:8px 12px;
      border-radius:999px;
      font-size:.82rem;
    }

    .card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      transition:transform .18s ease, background .25s ease, border-color .25s ease;
    }
    .card.done{
      background:var(--success);
      border-color:var(--success-line);
      animation:popDone .32s ease;
    }
    @keyframes popDone{
      0%{transform:scale(.985)}
      60%{transform:scale(1.01)}
      100%{transform:scale(1)}
    }
    .habit-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .habit-main{
      display:flex;
      gap:12px;
      min-width:0;
      flex:1;
    }
    .habit-icon{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      background:var(--surface-2);
      border:1px solid var(--line);
      font-size:1.3rem;
      flex:none;
    }
    .habit-name{
      margin:0 0 6px;
      font-size:1.02rem;
      line-height:1.2;
      word-break:break-word;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      color:var(--muted);
      font-size:.83rem;
    }
    .meta span{
      background:var(--surface-2);
      border:1px solid var(--line);
      padding:5px 8px;
      border-radius:999px;
    }
    .card-actions{
      display:flex;
      gap:8px;
      flex:none;
    }
    .mini-btn{
      width:38px;height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--text);
      display:grid;place-items:center;
      cursor:pointer;
      font-size:1rem;
    }
    .progress-wrap{margin-top:12px}
    .progress-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
      font-size:.84rem;
      color:var(--muted);
    }
    .progress{
      width:100%;
      height:10px;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
    }
    .progress > div{
      height:100%;
      width:0;
      background:linear-gradient(90deg,var(--primary),#4fa3ff);
      border-radius:999px;
      transition:width .2s ease;
    }
    .checklist{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }
    .check{
      width:38px;height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--muted);
      cursor:pointer;
      display:grid;place-items:center;
      font-weight:700;
      transition:all .18s ease;
    }
    .check.on{
      background:var(--primary-soft);
      color:var(--primary);
      border-color:transparent;
      transform:translateY(-1px);
    }
    .note{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      background:var(--surface-2);
      border:1px solid var(--line);
      color:var(--text);
      font-size:.9rem;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .empty{
      text-align:center;
      padding:36px 18px;
      background:var(--surface);
      border:1px dashed var(--line);
      border-radius:22px;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    form{
      display:grid;
      gap:12px;
      background:var(--surface);
      padding:14px;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
    }
    .field{display:grid; gap:7px}
    .field label{
      font-size:.9rem;
      color:var(--muted);
    }
    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      border-radius:16px;
      padding:14px 14px;
      font:inherit;
      outline:none;
    }
    textarea{min-height:100px; resize:vertical}
    input:focus, select:focus, textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(38,103,255,.14);
    }
    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .submit-row{
      display:flex;
      gap:10px;
      margin-top:4px;
    }
    .btn{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
    }
    .btn.primary{
      background:var(--primary);
      color:white;
      flex:1;
    }
    .btn.secondary{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }

    .templates{
      display:grid;
      gap:10px;
    }
    .template{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      width:100%;
      text-align:left;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      color:var(--text);
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .template span:first-child{
      font-weight:600;
    }
    .template small{color:var(--muted)}
    .settings-card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow);
    }
    .setting-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
    }
    .setting-line + .setting-line{border-top:1px solid var(--line)}
    .switch{
      position:relative;
      width:56px;height:32px;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:999px;
      cursor:pointer;
    }
    .switch::after{
      content:"";
      position:absolute;top:3px;left:3px;
      width:24px;height:24px;
      border-radius:50%;
      background:var(--primary);
      transition:left .2s ease;
    }
    .switch.on::after{left:27px}

    .bottom-nav{
      position:fixed;
      left:50%; transform:translateX(-50%);
      bottom:12px;
      width:min(520px, calc(100% - 16px));
      background:var(--nav);
      backdrop-filter: blur(12px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      box-shadow:var(--shadow);
      z-index:25;
    }
    .nav-btn{
      border:none;
      background:transparent;
      color:var(--muted);
      border-radius:18px;
      padding:10px 6px;
      font:inherit;
      display:grid;
      justify-items:center;
      gap:4px;
      cursor:pointer;
    }
    .nav-btn strong{font-size:.8rem; font-weight:700}
    .nav-btn .ico{font-size:1.2rem; line-height:1}
    .nav-btn.active{
      background:var(--surface);
      color:var(--text);
      border:1px solid var(--line);
    }

    .modal-backdrop{
      position:fixed; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:16px;
      z-index:50;
    }
    .modal-backdrop.open{display:flex}
    .modal{
      width:min(520px,100%);
      background:var(--surface);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
    }
    .modal h3{margin:0 0 8px}
    .modal p{margin:0;color:var(--muted)}
    .modal-actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:18px;
    }

    @media (max-width:420px){
      .row-2{grid-template-columns:1fr}
      .brand h1{font-size:1.28rem}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Mentis Habits</h1>
        <small id="todayDate"></small>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Alternar modo claro e escuro">🌙</button>
        <button class="icon-btn" id="resetDayBtn" aria-label="Reset do dia">🔄</button>
      </div>
    </header>

    <main>
      <section class="page active" id="page-hoje">
        <div class="section-title">
          <h2>Hoje</h2>
          <div class="pill" id="summaryPill">0 hábitos</div>
        </div>
        <div id="todayList"></div>
      </section>

      <section class="page" id="page-criar">
        <div class="section-title">
          <h2 id="formTitle">Criar hábito</h2>
        </div>
        <form id="habitForm">
          <input type="hidden" id="habitId" />
          <div class="field">
            <label for="habitName">Nome</label>
            <input id="habitName" maxlength="60" placeholder="Ex.: Beber água" required />
          </div>
          <div class="field">
            <label for="habitCategory">Categoria</label>
            <select id="habitCategory" required>
              <option value="saude">❤️ Saúde</option>
              <option value="hidratacao">💧 Hidratação</option>
              <option value="exercicio">🏋️ Exercício</option>
              <option value="estudo">📚 Estudo</option>
              <option value="mental">🧠 Mental</option>
              <option value="financas">💰 Finanças</option>
              <option value="sono">🌙 Sono</option>
            </select>
          </div>
          <div class="row-2">
            <div class="field">
              <label for="habitTarget">Quantidade diária</label>
              <input id="habitTarget" type="number" min="1" max="20" value="1" required />
            </div>
            <div class="field">
              <label for="habitTime">Horário</label>
              <input id="habitTime" type="time" />
            </div>
          </div>
          <div class="field">
            <label for="habitNote">Nota</label>
            <textarea id="habitNote" maxlength="240" placeholder="Opcional"></textarea>
          </div>
          <div class="submit-row">
            <button type="submit" class="btn primary" id="saveBtn">Guardar</button>
            <button type="button" class="btn secondary" id="clearFormBtn">Limpar</button>
          </div>
        </form>
      </section>

      <section class="page" id="page-modelos">
        <div class="section-title">
          <h2>Modelos</h2>
        </div>
        <div class="templates" id="templatesList"></div>
      </section>

      <section class="page" id="page-definicoes">
        <div class="section-title">
          <h2>Definições</h2>
        </div>
        <div class="settings-card">
          <div class="setting-line">
            <div>
              <strong>Modo</strong><br />
              <small id="themeLabel" style="color:var(--muted)">Claro</small>
            </div>
            <button class="switch" id="themeSwitch" aria-label="Alternar tema"></button>
          </div>
          <div class="setting-line">
            <div>
              <strong>App</strong><br />
              <small style="color:var(--muted)">Mentis Habits · PWA</small>
            </div>
            <span class="pill">v1.0</span>
          </div>
          <div class="setting-line">
            <div>
              <strong>Utilização</strong><br />
              <small style="color:var(--muted)">Os dados ficam guardados neste dispositivo.</small>
            </div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <button class="nav-btn active" data-page="hoje"><span class="ico">✅</span><strong>Hoje</strong></button>
      <button class="nav-btn" data-page="criar"><span class="ico">➕</span><strong>Criar</strong></button>
      <button class="nav-btn" data-page="modelos"><span class="ico">🧩</span><strong>Modelos</strong></button>
      <button class="nav-btn" data-page="definicoes"><span class="ico">⚙️</span><strong>Definições</strong></button>
    </nav>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal">
      <h3 id="modalTitle">Confirmar</h3>
      <p id="modalText"></p>
      <div class="modal-actions">
        <button class="btn secondary" id="modalCancel">Cancelar</button>
        <button class="btn primary" id="modalConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'mentis-habits-data-v1';
    const THEME_KEY = 'mentis-habits-theme';
    const categories = {
      saude: { label: 'Saúde', icon: '❤️' },
      hidratacao: { label: 'Hidratação', icon: '💧' },
      exercicio: { label: 'Exercício', icon: '🏋️' },
      estudo: { label: 'Estudo', icon: '📚' },
      mental: { label: 'Mental', icon: '🧠' },
      financas: { label: 'Finanças', icon: '💰' },
      sono: { label: 'Sono', icon: '🌙' },
    };

    const templates = [
      { name:'Beber água', category:'hidratacao', target:8, time:'', note:'' },
      { name:'Ler 10 páginas', category:'estudo', target:1, time:'', note:'10 páginas' },
      { name:'Treinar', category:'exercicio', target:1, time:'', note:'' },
      { name:'Meditar', category:'mental', target:1, time:'', note:'10 minutos' },
      { name:'Dormir cedo', category:'sono', target:1, time:'22:30', note:'' },
      { name:'Registar despesas', category:'financas', target:1, time:'', note:'' },
    ];

    const todayList = document.getElementById('todayList');
    const summaryPill = document.getElementById('summaryPill');
    const todayDate = document.getElementById('todayDate');
    const habitForm = document.getElementById('habitForm');
    const formTitle = document.getElementById('formTitle');
    const habitId = document.getElementById('habitId');
    const habitName = document.getElementById('habitName');
    const habitCategory = document.getElementById('habitCategory');
    const habitTarget = document.getElementById('habitTarget');
    const habitTime = document.getElementById('habitTime');
    const habitNote = document.getElementById('habitNote');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const templatesList = document.getElementById('templatesList');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    const themeToggle = document.getElementById('themeToggle');
    const themeSwitch = document.getElementById('themeSwitch');
    const themeLabel = document.getElementById('themeLabel');

    let state = loadState();
    let pendingConfirm = null;

    function todayKey(){
      return new Date().toISOString().slice(0,10);
    }

    function loadState(){
      try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { habits: [] };
      }catch{
        return { habits: [] };
      }
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatDate(){
      const d = new Date();
      todayDate.textContent = d.toLocaleDateString('pt-PT', {
        weekday:'long',
        day:'2-digit',
        month:'long'
      });
    }

    function getProgress(habit){
      const done = habit.progress?.[todayKey()]?.length || 0;
      const total = Number(habit.target) || 1;
      const pct = Math.round((done / total) * 100);
      return { done, total, pct };
    }

    function ensureHabitProgress(habit){
      if(!habit.progress) habit.progress = {};
      if(!habit.progress[todayKey()]) habit.progress[todayKey()] = [];
    }

    function renderToday(){
      const habits = state.habits;
      summaryPill.textContent = `${habits.length} ${habits.length === 1 ? 'hábito' : 'hábitos'}`;
      if(!habits.length){
        todayList.innerHTML = `<div class="empty">Ainda não tens hábitos.</div>`;
        return;
      }

      todayList.innerHTML = habits.map(habit => {
        ensureHabitProgress(habit);
        const c = categories[habit.category] || categories.saude;
        const { done, total, pct } = getProgress(habit);
        const checks = Array.from({length: total}, (_, i) => {
          const on = habit.progress[todayKey()].includes(i);
          return `<button class="check ${on ? 'on' : ''}" data-id="${habit.id}" data-check="${i}" aria-label="Marcar passo ${i+1}">${on ? '✓' : i+1}</button>`;
        }).join('');
        return `
          <article class="card ${pct === 100 ? 'done' : ''}">
            <div class="habit-top">
              <div class="habit-main">
                <div class="habit-icon">${c.icon}</div>
                <div style="min-width:0;flex:1">
                  <h3 class="habit-name">${escapeHtml(habit.name)}</h3>
                  <div class="meta">
                    <span>${c.label}</span>
                    ${habit.time ? `<span>🕒 ${habit.time}</span>` : ''}
                    <span>${done}/${total}</span>
                  </div>
                </div>
              </div>
              <div class="card-actions">
                <button class="mini-btn" data-edit="${habit.id}" aria-label="Editar hábito">✏️</button>
                <button class="mini-btn" data-delete="${habit.id}" aria-label="Apagar hábito">🗑️</button>
              </div>
            </div>
            <div class="progress-wrap">
              <div class="progress-head">
                <span>Progresso</span>
                <strong>${pct}%</strong>
              </div>
              <div class="progress"><div style="width:${pct}%"></div></div>
            </div>
            <div class="checklist">${checks}</div>
            ${habit.note ? `<div class="note">${escapeHtml(habit.note)}</div>` : ''}
          </article>
        `;
      }).join('');
    }

    function renderTemplates(){
      templatesList.innerHTML = templates.map((tpl, idx) => {
        const c = categories[tpl.category];
        return `
          <button class="template" data-template="${idx}">
            <span>${c.icon} ${tpl.name}</span>
            <small>Editar antes de guardar →</small>
          </button>
        `;
      }).join('');
    }

    function openPage(page){
      document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === `page-${page}`));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    }

    function resetForm(){
      habitForm.reset();
      habitId.value = '';
      habitTarget.value = 1;
      formTitle.textContent = 'Criar hábito';
      habitName.focus();
    }

    function fillForm(data){
      habitId.value = data.id || '';
      habitName.value = data.name || '';
      habitCategory.value = data.category || 'saude';
      habitTarget.value = data.target || 1;
      habitTime.value = data.time || '';
      habitNote.value = data.note || '';
      formTitle.textContent = data.id ? 'Editar hábito' : 'Criar hábito';
    }

    function saveHabit(e){
      e.preventDefault();
      const habit = {
        id: habitId.value || crypto.randomUUID(),
        name: habitName.value.trim(),
        category: habitCategory.value,
        target: Math.max(1, Math.min(20, Number(habitTarget.value) || 1)),
        time: habitTime.value,
        note: habitNote.value.trim(),
      };
      if(!habit.name) return;

      const existing = state.habits.find(h => h.id === habit.id);
      if(existing){
        existing.name = habit.name;
        existing.category = habit.category;
        existing.target = habit.target;
        existing.time = habit.time;
        existing.note = habit.note;
        ensureHabitProgress(existing);
        const current = existing.progress[todayKey()] || [];
        existing.progress[todayKey()] = current.filter(i => i < habit.target);
      }else{
        state.habits.unshift({ ...habit, progress: { [todayKey()]: [] } });
      }

      saveState();
      renderToday();
      resetForm();
      openPage('hoje');
    }

    function editHabit(id){
      const habit = state.habits.find(h => h.id === id);
      if(!habit) return;
      fillForm(habit);
      openPage('criar');
    }

    function deleteHabit(id){
      const habit = state.habits.find(h => h.id === id);
      if(!habit) return;
      showConfirm('Apagar hábito', `Queres apagar "${habit.name}"?`, () => {
        state.habits = state.habits.filter(h => h.id !== id);
        saveState();
        renderToday();
        if(habitId.value === id) resetForm();
      });
    }

    function toggleCheck(id, index){
      const habit = state.habits.find(h => h.id === id);
      if(!habit) return;
      ensureHabitProgress(habit);
      const arr = habit.progress[todayKey()];
      const pos = arr.indexOf(index);
      if(pos >= 0) arr.splice(pos, 1);
      else arr.push(index);
      arr.sort((a,b) => a-b);
      saveState();
      renderToday();
    }

    function resetDay(){
      if(!state.habits.length) return;
      showConfirm('Reset do dia', 'Limpar o progresso de todos os hábitos de hoje?', () => {
        state.habits.forEach(h => {
          if(!h.progress) h.progress = {};
          h.progress[todayKey()] = [];
        });
        saveState();
        renderToday();
      });
    }

    function showConfirm(title, text, onConfirm){
      modalTitle.textContent = title;
      modalText.textContent = text;
      pendingConfirm = onConfirm;
      modalBackdrop.classList.add('open');
      modalBackdrop.setAttribute('aria-hidden', 'false');
    }

    function closeConfirm(){
      pendingConfirm = null;
      modalBackdrop.classList.remove('open');
      modalBackdrop.setAttribute('aria-hidden', 'true');
    }

    function escapeHtml(str=''){
      return str
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function applyTheme(theme){
      const dark = theme === 'dark';
      document.body.classList.toggle('dark', dark);
      themeToggle.textContent = dark ? '☀️' : '🌙';
      themeSwitch.classList.toggle('on', dark);
      themeLabel.textContent = dark ? 'Escuro' : 'Claro';
      localStorage.setItem(THEME_KEY, theme);
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      metaTheme.setAttribute('content', dark ? '#0b1220' : '#f3f6fb');
    }

    function initTheme(){
      const saved = localStorage.getItem(THEME_KEY);
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(theme);
    }

    function registerEvents(){
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => openPage(btn.dataset.page));
      });

      habitForm.addEventListener('submit', saveHabit);
      clearFormBtn.addEventListener('click', resetForm);
      themeToggle.addEventListener('click', () => applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
      themeSwitch.addEventListener('click', () => applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
      document.getElementById('resetDayBtn').addEventListener('click', resetDay);

      todayList.addEventListener('click', (e) => {
        const editId = e.target.closest('[data-edit]')?.dataset.edit;
        const deleteId = e.target.closest('[data-delete]')?.dataset.delete;
        const checkBtn = e.target.closest('[data-check]');
        if(editId) editHabit(editId);
        if(deleteId) deleteHabit(deleteId);
        if(checkBtn){
          toggleCheck(checkBtn.dataset.id, Number(checkBtn.dataset.check));
        }
      });

      templatesList.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-template]');
        if(!btn) return;
        const tpl = templates[Number(btn.dataset.template)];
        fillForm({ ...tpl, id: '' });
        formTitle.textContent = 'Criar hábito';
        openPage('criar');
      });

      modalCancel.addEventListener('click', closeConfirm);
      modalConfirm.addEventListener('click', () => {
        if(pendingConfirm) pendingConfirm();
        closeConfirm();
      });
      modalBackdrop.addEventListener('click', (e) => {
        if(e.target === modalBackdrop) closeConfirm();
      });
    }

    function registerSW(){
      if('serviceWorker' in navigator){
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    }

    formatDate();
    initTheme();
    renderTemplates();
    renderToday();
    resetForm();
    registerEvents();
    registerSW();
  </script>
</body>
</html>
